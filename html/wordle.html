<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Wordle - 4 Letters</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            background-color:  rgb(17, 26, 26);
            color:white
        }
        h1 {
            margin-bottom: 20px;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: min(100%, 360px);
            padding: 10px;
        }
        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-links a {
            text-decoration: none;
            color: #333;
            border: 1px solid #888;
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
        }
        .nav-links a:hover {
            background: #e8e8e8;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 50px);
            grid-template-rows: repeat(6, 50px);
            gap: 5px;
            margin-bottom: 20px;
        }
        .cell {
            width: 50px;
            height: 50px;
            border: 2px solid #d3d6da;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            background-color: white;
        }
        .correct {
            background-color: #6aaa64;
            color: white;
        }
        .present {
            background-color: #c9b458;
            color: white;
        }
        .absent {
            background-color: #787c7e;
            color: white;
        }
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            text-transform: uppercase;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }
        .hidden {
            display: none;
        }
    </style>
</head>

s", "zarf", "zeal", "zebu", "zeds", "zees", "zein", "zeks", "zeps", "zerk", "zero", "zest", "zeta", "zigs", "zill", "zinc", "zine", "zing", "zins", "zips", "ziti", "zits", "zoea", "zoic", "zona", "zone", "zonk", "zoom", "zoon", "zoos", "zori", "zouk", "zyme"];
        const solutions = validWords.slice(0, 500);
        let targetWord = solutions[Math.floor(Math.random() * solutions.length)];
        let guesses = [];
        let currentGuess = 0;
        const maxGuesses = 6;

        const grid = document.getElementById('grid');
        const guessInput = document.getElementById('guessInput');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const message = document.getElementById('message');

        // Initialize grid
        for (let i = 0; i < maxGuesses; i++) {
            for (let j = 0; j < 4; j++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                grid.appendChild(cell);
            }
        }

        function updateGrid() {
            const cells = document.querySelectorAll('.cell');
            guesses.forEach((guess, guessIndex) => {
                const result = checkGuess(guess);
                for (let i = 0; i < 4; i++) {
                    const cellIndex = guessIndex * 4 + i;
                    cells[cellIndex].textContent = guess[i];
                    cells[cellIndex].classList.add(result[i]);
                }
            });
        }

        function checkGuess(guess) {
            const result = [];
            const targetLetters = targetWord.split('');
            const guessLetters = guess.split('');

            // First pass: correct positions
            for (let i = 0; i < 4; i++) {
                if (guessLetters[i] === targetLetters[i]) {
                    result[i] = 'correct';
                    targetLetters[i] = null;
                    guessLetters[i] = null;
                }
            }

            // Second pass: present but wrong position
            for (let i = 0; i < 4; i++) {
                if (guessLetters[i] !== null) {
                    const index = targetLetters.indexOf(guessLetters[i]);
                    if (index !== -1) {
                        result[i] = 'present';
                        targetLetters[index] = null;
                    } else {
                        result[i] = 'absent';
                    }
                }
            }

            return result;
        }

        function submitGuess() {
            const guess = guessInput.value.toLowerCase().trim();
            if (guess.length !== 4) {
                message.textContent = 'Please enter a 4-letter word.';
                return;
            }
            if (!validWords.includes(guess)) {
                message.textContent = 'Word not in list. Try again.';
                return;
            }
            guesses.push(guess);
            updateGrid();
            currentGuess++;
            guessInput.value = '';

            if (guess === targetWord) {
                message.textContent = `Congratulations! You guessed the word in ${currentGuess} guess${currentGuess > 1 ? 'es' : ''}!`;
                endGame();
            } else if (currentGuess >= maxGuesses) {
                message.textContent = `Game over! The word was ${targetWord.toUpperCase()}.`;
                endGame();
            } else {
                message.textContent = '';
            }
        }

        function endGame() {
            guessInput.disabled = true;
            submitBtn.disabled = true;
        }

        function resetGame() {
            // Clear the grid
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.textContent = '';
                cell.className = 'cell';
            });
            // Reset state
            guesses.length = 0;
            currentGuess = 0;
            targetWord = solutions[Math.floor(Math.random() * solutions.length)];
            // Re-enable inputs
            guessInput.disabled = false;
            submitBtn.disabled = false;
            guessInput.value = '';
            message.textContent = '';
        }

        submitBtn.addEventListener('click', submitGuess);
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitGuess();
            }
        });

        resetBtn.addEventListener('click', resetGame);
    </script>
